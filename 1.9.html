<!DOCTYPE html>
<html>
<head>
	<style>
		body {
			background-image: url(cave.jpg);
			font-family: Arial;
			margin: 0;
			padding: 20px;
			color: black;
			line-height: 1.6;
			background-size: cover;
			background-repeat: no-repeat;
			background-position: center;
		}
		header img{
			width: 100%;
			display: flex;
		}
		section{
			margin-top: 30px;
		}
		h2{
			color: purple;

		}
		.Motto{
			background-color: red;
			padding: 10px;
			text-align: center;
			color: white;
			border-radius: 10px;
			margin-top: 30px;
		}
		nav{
            width: 100%;
            margin: 0;
            background-color: black;
        }
        nav ul{
            list-style: none;
            margin:0;
            padding:0;
            display:flex;
        }
        nav ul li{
            padding: 10px 20px;
        }
        nav ul li a{
            text-decoration: none;
            color: white;
            font-weight: bold;
        }
        nav ul li a:hover{
            color: black;
            background-color: white;
        }
	</style>
</head>
<body>
<header>
	<img src="sma.jpg">
</header>
<nav>
        <ul>
            <li><a href="#">Beranda</a></li>
            <li><a href="#">Berita</a></li>
            <li><a href="#">Sejarah Sekolah</a></li>
            <li><a href="#">Sarana & Prasarana</a></li>
            <li><a href="#">Data Murid</a></li>
        </ul>
    </nav>
<div class="Motto">
<strong>Motto Sekolah: “Berprestasi, Berkarakter, dan Berbudaya”</strong>
</div>
</body>
</html>
