<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Toko Pradiptatama</title>
    <style>
        body {
            font-family: Georgia;
            background-color: aliceblue;
        }
        header{
            background-color: green;
            color: white;
            text-align: center;
            padding: 20px;
        }
        nav{
            width: 100%;
            margin: 0;
            background-color: black;
        }
        nav ul{
            list-style: none;
            margin:0;
            padding:0;
            display:flex;
        }
        nav ul li{
            padding: 10px 20px;
        }
        nav ul li a{
            text-decoration: none;
            color: white;
            font-weight: bold;
        }
        nav ul li a:hover{
            color: black;
            background-color: white;
        }
    </style>
</head>
<body>
    <header>
        <h1>TOKO PRADIPTATAMA</h1>
        <p>Melayani dengan sepenuh hati</p>
    </header>

    <nav>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">Product</a></li>
            <li><a href="#">Gallery</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>
</body>
</html>
